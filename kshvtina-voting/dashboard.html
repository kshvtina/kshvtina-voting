<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Kshvtina Voting</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-600">Kshvtina Voting</h1>
      <div class="space-x-6">
        <a href="tracking.html" class="hover:text-blue-600">Tracking</a>
        <a href="tips.html" class="hover:text-blue-600">Tips & Trick</a>
        <a href="dashboard.html" class="text-blue-600 font-medium">Dashboard Admin</a>
        <button onclick="logout()" class="text-red-500 hover:text-red-600">Logout</button>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold">Dashboard Admin</h1>
      <button onclick="refreshData()" 
              class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-2xl text-sm font-medium">
        Refresh Data
      </button>
    </div>

    <!-- Statistik Singkat -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="bg-white p-6 rounded-3xl shadow">
        <p class="text-gray-500 text-sm">Total Voting Records</p>
        <p id="totalRecords" class="text-4xl font-bold text-blue-600 mt-2">0</p>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow">
        <p class="text-gray-500 text-sm">Total User Aktif</p>
        <p id="totalUsers" class="text-4xl font-bold text-green-600 mt-2">0</p>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow">
        <p class="text-gray-500 text-sm">Suara Terbanyak</p>
        <p id="topKandidat" class="text-4xl font-bold text-amber-600 mt-2">-</p>
      </div>
    </div>

    <!-- Tabel Semua Data -->
    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <div class="p-6 border-b">
        <h2 class="text-xl font-semibold">Semua Data Voting</h2>
      </div>
      <table class="w-full" id="adminTable">
        <thead class="bg-gray-100">
          <tr>
            <th class="p-4 text-left">User</th>
            <th class="p-4 text-left">Tanggal</th>
            <th class="p-4 text-left">Kandidat</th>
            <th class="p-4 text-left">Suara</th>
            <th class="p-4 text-left">Notes</th>
            <th class="p-4 text-center">Aksi</th>
          </tr>
        </thead>
        <tbody id="adminTableBody" class="divide-y"></tbody>
      </table>
    </div>
  </div>

  <script>
    const supabase = Supabase.createClient(
      'https://tyrjphwdneahqjwqszuo.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5cmpwaHdkbmVhaHFqd3FzenVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTAyNTAsImV4cCI6MjA5NzA4NjI1MH0.9qlqiyAALvOznLJ4Yq8VMPnLvvyW6CbOKlin6DrqQvs'
    );

    let currentUser = null;

    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return window.location.href = 'login.html';

      currentUser = session.user;

      // Cek apakah user adalah admin (sesuaikan dengan cara kamu menyimpan role)
      const isAdmin = await checkIsAdmin(currentUser.id);
      if (!isAdmin) {
        alert("Akses ditolak! Halaman ini hanya untuk Admin.");
        window.location.href = 'tracking.html';
        return;
      }

      loadAllData();
    }

    async function checkIsAdmin(userId) {
      // Cara 1: Pakai user metadata (paling mudah)
      if (currentUser.user_metadata?.role === 'admin') return true;

      // Cara 2: Cek table profiles (kalau kamu pakai ini)
      const { data } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', userId)
        .single();

      return data?.role === 'admin';
    }

    async function loadAllData() {
      const { data, error } = await supabase
        .from('voting_records')
        .select(`
          *,
          profiles!user_id (email, full_name)
        `)
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      renderTable(data);
      updateStats(data);
    }

    function renderTable(data) {
      const tbody = document.getElementById('adminTableBody');
      tbody.innerHTML = '';

      data.forEach(row => {
        tbody.innerHTML += `
          <tr class="hover:bg-gray-50">
            <td class="p-4">${row.profiles?.email || 'Unknown User'}</td>
            <td class="p-4">${row.tanggal}</td>
            <td class="p-4 font-medium">${row.kandidat}</td>
            <td class="p-4 font-semibold text-blue-600">${row.suara}</td>
            <td class="p-4">${row.notes || '-'}</td>
            <td class="p-4 text-center">
              <button onclick="deleteRecord('${row.id}')" 
                      class="text-red-500 hover:text-red-700 text-sm font-medium">
                Hapus
              </button>
            </td>
          </tr>`;
      });
    }

    function updateStats(data) {
      document.getElementById('totalRecords').textContent = data.length;

      // Total user unik
      const uniqueUsers = new Set(data.map(item => item.user_id)).size;
      document.getElementById('totalUsers').textContent = uniqueUsers;

      // Kandidat dengan suara terbanyak
      const kandidatCount = {};
      data.forEach(item => {
        kandidatCount[item.kandidat] = (kandidatCount[item.kandidat] || 0) + item.suara;
      });
      const top = Object.entries(kandidatCount).sort((a,b) => b[1] - a[1])[0];
      document.getElementById('topKandidat').textContent = top ? top[0] : '-';
    }

    async function deleteRecord(id) {
      if (!confirm("Yakin hapus data ini?")) return;

      const { error } = await supabase
        .from('voting_records')
        .delete()
        .eq('id', id);

      if (error) alert(error.message);
      else {
        alert("Data berhasil dihapus");
        loadAllData();
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    }

    async function refreshData() {
      loadAllData();
    }

    window.onload = checkAuth;
  </script>
</body>
</html>
