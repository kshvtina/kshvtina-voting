<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Member - Kshvtina Voting</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .hero-bg { background: linear-gradient(135deg, #a8d4f0, #6da7cc, #4a8ab8); }
  </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center">

  <div class="max-w-md w-full mx-4">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
      <div class="hero-bg text-white p-10 text-center">
        <img src="assets/kshvtina_logo.png" alt="Kshvtina" class="h-16 mx-auto mb-4">
        <h1 class="text-3xl font-bold">Member Area</h1>
        <p class="text-white/80 mt-1">Kshvtina Voting</p>
      </div>

      <div class="p-8">
        <h2 class="text-2xl font-semibold text-center mb-8 text-zinc-800">Login ke Member Area</h2>

        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-2">Username</label>
            <input id="username" type="text" 
                   class="w-full px-5 py-4 border border-zinc-300 rounded-2xl focus:outline-none focus:border-[#6da7cc]">
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-2">Password</label>
            <input id="password" type="password" 
                   class="w-full px-5 py-4 border border-zinc-300 rounded-2xl focus:outline-none focus:border-[#6da7cc]">
          </div>

          <button onclick="handleLogin()" 
                  class="w-full bg-[#6da7cc] hover:bg-[#5a94b8] text-white font-semibold py-4 rounded-2xl transition text-lg">
            MASUK
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (username === "pasukanbebek" && password === "OrisVTINA2026") {
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("username", username);
        alert("✅ Login berhasil! Selamat datang.");
        window.location.href = "tips.html";
      } else {
        alert("❌ Username atau Password salah!");
      }
    }

    document.addEventListener('keypress', (e) => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
